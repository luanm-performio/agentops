<style>
    /* Scoped styles for the run output area */
    .run-output { height: 100%; overflow-y: auto; padding: 1rem; font-size: 0.8125rem; line-height: 1.6; }

    /* Markdown text blocks */
    .output-text { margin-bottom: 0.75rem; }
    .output-text p { margin-bottom: 0.4rem; }
    .output-text pre {
        background: rgba(0,0,0,0.45);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 0.375rem;
        padding: 0.75rem 1rem;
        margin: 0.5rem 0;
        overflow-x: auto;
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        white-space: pre;
    }
    .output-text code {
        background: rgba(0,0,0,0.35);
        border-radius: 0.2rem;
        padding: 0.1em 0.35em;
        font-family: ui-monospace, monospace;
        font-size: 0.8em;
    }
    .output-text pre code { background: none; padding: 0; }
    .output-text h1,.output-text h2,.output-text h3 { font-weight: 700; margin: 0.75rem 0 0.25rem; }
    .output-text ul,.output-text ol { padding-left: 1.25rem; margin: 0.25rem 0; }
    .output-text li { margin: 0.15rem 0; }
    .output-text strong { font-weight: 600; }
    .output-text table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; font-size: 0.8rem; }
    .output-text th { background: rgba(255,255,255,0.1); font-weight: 600; text-align: left; padding: 0.4rem 0.75rem; border: 1px solid rgba(255,255,255,0.15); }
    .output-text td { padding: 0.35rem 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
    .output-text tr:nth-child(even) td { background: rgba(255,255,255,0.04); }

    /* Tool call line */
    .output-tool {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        color: #fbbf24;
        margin: 0.5rem 0 0.15rem;
        opacity: 0.9;
    }
    .output-tool-icon { margin-right: 0.2rem; }
    .output-tool-args { opacity: 0.6; }

    /* Tool result block */
    .output-result {
        background: rgba(0,0,0,0.3);
        border-left: 2px solid rgba(255,255,255,0.15);
        padding: 0.4rem 0.75rem;
        margin: 0.15rem 0 0.5rem 1rem;
        font-family: ui-monospace, monospace;
        font-size: 0.72rem;
        opacity: 0.6;
        white-space: pre-wrap;
        word-break: break-word;
    }

    /* Status lines */
    .output-done  { color: #4ade80; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.15); }
    .output-error { color: #f87171; }
    .output-cost  { font-size: 0.7rem; opacity: 0.35; margin-top: 0.25rem; }
</style>

<div class="flex items-center justify-between mb-3 shrink-0">
    <div class="min-w-0">
        <p class="font-bold">{{ agent.name }}</p>
        <p class="text-xs text-base-content/50 mt-0.5 font-mono truncate">{{ prompt }}</p>
    </div>
    <span class="loading loading-dots loading-sm text-primary ml-4 shrink-0" id="run-spinner"></span>
</div>

<div hx-ext="sse"
     sse-connect="{% url 'agent_run_stream' agent.pk %}"
     sse-close="close"
     class="flex-1 min-h-0 rounded-lg overflow-hidden"
     style="background: #1a1f2e;">
    <div id="run-output"
         sse-swap="message"
         hx-swap="beforeend"
         class="run-output text-slate-200">
    </div>
</div>

<div class="modal-action mt-3 shrink-0">
    <button onclick="document.getElementById('agent-run-modal').close()" class="btn btn-ghost btn-sm">
        Close
    </button>
</div>

<script>
    (function () {
        const output = document.getElementById('run-output');
        const spinner = document.getElementById('run-spinner');

        if (output) {
            new MutationObserver(function () {
                output.scrollTop = output.scrollHeight;
            }).observe(output, { childList: true, subtree: true });
        }

        document.body.addEventListener('htmx:sseMessage', function (e) {
            if (spinner && /output-done|output-error|Timeout/.test(e.detail?.data ?? '')) {
                spinner.style.display = 'none';
            }
        });
    })();
</script>
