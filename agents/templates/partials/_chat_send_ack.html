<!-- User message bubble (appended to #messages). data-send-ack triggers the SSE stream. -->
<div class="chat chat-end" data-send-ack>
    <div class="chat-bubble chat-bubble-primary max-w-[80%] text-sm">
        <span class="whitespace-pre-wrap">{{ content }}</span>
    </div>
    <div class="chat-footer text-xs text-base-content/30 mt-0.5">just now</div>
</div>
