{% if agents %}
<div class="overflow-x-auto">
    <table class="table table-sm">
        <thead>
            <tr class="border-base-300">
                <th>Name</th>
                <th>Working Directory</th>
                <th>MCP Servers</th>
                <th class="w-28"></th>
            </tr>
        </thead>
        <tbody>
            {% for agent in agents %}
            <tr class="hover:bg-base-200">
                <td class="font-medium">{{ agent.name }}</td>
                <td class="font-mono text-xs text-base-content/60">{{ agent.working_directory|default:"—" }}</td>
                <td>
                    <div class="flex gap-1 flex-wrap">
                        {% for server in agent.mcp_servers %}
                            <span class="badge badge-xs badge-ghost">{{ server }}</span>
                        {% empty %}
                            <span class="text-base-content/30 text-xs">—</span>
                        {% endfor %}
                    </div>
                </td>
                <td>
                    <div class="flex gap-1">
                        <button class="btn btn-ghost btn-xs"
                                hx-get="{% url 'agent_run' agent.pk %}"
                                hx-target="#run-modal-content"
                                hx-swap="innerHTML">
                            ▶ Run
                        </button>
                        <button class="btn btn-ghost btn-xs"
                                hx-get="{% url 'agent_update' agent.pk %}"
                                hx-target="#modal-content"
                                hx-swap="innerHTML">
                            Edit
                        </button>
                        <button class="btn btn-ghost btn-xs text-error"
                                hx-post="{% url 'agent_delete' agent.pk %}"
                                hx-confirm="Delete agent '{{ agent.name }}'? This cannot be undone."
                                hx-disabled-elt="this">
                            Delete
                        </button>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="text-center py-20 text-base-content/30">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
    </svg>
    <p class="text-sm">No agents yet. Create one to get started.</p>
</div>
{% endif %}
